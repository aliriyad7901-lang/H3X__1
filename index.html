<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>H3X GROUP | Exclusive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* إعدادات الهاتف والألوان */
        :root {
            --bg: #000000;
            --card-bg: #0a0a0a;
            --insta-color: #E1306C; /* لون الإنستا الرسمي */
            --wa-color: #25D366;    /* لون الواتساب الرسمي */
            --white: #ffffff;
            --accent: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: 'Segoe UI', Roboto, sans-serif;
            line-height: 1.4;
        }

        /* ترحيب علوي متحرك ونحيف */
        .welcome-header {
            padding: 20px 10px;
            text-align: center;
            border-bottom: 1px solid var(--accent);
            background: linear-gradient(to bottom, #111, #000);
        }

        .welcome-header h1 {
            font-size: 1.5rem;
            letter-spacing: 2px;
            animation: fadeIn 1.5s ease-in;
        }

        .welcome-header span { color: #888; font-size: 0.8rem; display: block; margin-top: 5px; }

        /* حاوية الصور الرئيسية - مخصصة للجوال */
        .main-container {
            width: 95%;
            margin: 10px auto;
            border: 1px solid var(--accent);
            position: relative;
            background: var(--card-bg);
        }

        .section-label {
            font-size: 0.7rem;
            background: var(--white);
            color: #000;
            display: inline-block;
            padding: 2px 10px;
            font-weight: bold;
            position: absolute;
            top: 0; right: 0; z-index: 5;
        }

        .main-img-box { width: 100%; height: auto; display: block; }

        /* سلايدر البضاعة - تحسين المسافات */
        .products-section { padding: 15px 0; }
        .slider-viewport {
            width: 95%;
            margin: auto;
            overflow: hidden;
            border: 1px solid #222;
            position: relative;
            border-radius: 4px;
        }

        .slides-container {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .slide {
            min-width: 100%;
            position: relative;
            aspect-ratio: 1 / 1; /* يجعل الصور مربعة ومنظمة */
            background: #050505;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* لضمان عدم قص البضاعة */
        }

        /* أسهم التنقل - واضحة للمس */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            border: 1px solid #444;
            color: #fff;
            padding: 15px 10px;
            z-index: 10;
            cursor: pointer;
        }
        .prev-btn { left: 0; border-radius: 0 5px 5px 0; }
        .next-btn { right: 0; border-radius: 5px 0 0 5px; }

        /* تعليمات الزبون */
        .instructions {
            width: 90%;
            margin: 15px auto;
            padding: 15px;
            background: #111;
            border-right: 3px solid var(--white);
            font-size: 0.9rem;
        }

        /* أزرار التواصل - بألوان التطبيقات */
        .contact-footer {
            padding: 20px 15px 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 15px;
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-insta { background-color: var(--insta-color); box-shadow: 0 4px 15px rgba(225, 48, 108, 0.3); }
        .btn-wa { background-color: var(--wa-color); box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }
        .btn:active { transform: scale(0.95); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .counter {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 2px 8px;
            font-size: 0.7rem;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <!-- الترحيب -->
    <header class="welcome-header">
        <h1>H3X GROUP</h1>
        <span>أهلاً بكم في عالمنا الخاص</span>
    </header>

    <!-- الصورة الرئيسية -->
    <div class="main-container">
        <div class="section-label">MAIN PROFILE</div>
        <img src="main.jpg" class="main-img-box" alt="Main Image" onerror="this.src='https://via.placeholder.com/400x250/111/fff?text=MAIN+IMAGE+JPG'">
    </div>

    <!-- تعليمات الزبون -->
    <div class="instructions">
        <strong>عزيزي الزبون:</strong>
        <p>يمكنك تصفح أحدث بضائعنا عبر التقليب بين الصور أدناه. للتواصل والاستفسار، استخدم أزرار التواصل السريع في الأسفل.</p>
    </div>

    <!-- معرض البضاعة (5 خانات) -->
    <section class="products-section">
        <div class="slider-viewport">
            <div class="slides-container" id="slider">
                <div class="slide"><img src="1.jpg" alt="Item 1"><div class="counter">01 / 05</div></div>
                <div class="slide"><img src="2.jpg" alt="Item 2"><div class="counter">02 / 05</div></div>
                <div class="slide"><img src="3.jpg" alt="Item 3"><div class="counter">03 / 05</div></div>
                <div class="slide"><img src="4.jpg" alt="Item 4"><div class="counter">04 / 05</div></div>
                <div class="slide"><img src="5.jpg" alt="Item 5"><div class="counter">05 / 05</div></div>
            </div>
            
            <button class="nav-btn prev-btn" onclick="moveSlide(-1)"><i class="fas fa-chevron-left"></i></button>
            <button class="nav-btn next-btn" onclick="moveSlide(1)"><i class="fas fa-chevron-right"></i></button>
        </div>
    </section>

    <!-- أزرار التواصل بالأسفل -->
    <footer class="contact-footer">
        <a href="https://www.instagram.com/h3x.group?igsh=YzU3bmdlNTVzbzN4" class="btn btn-insta">
            <i class="fab fa-instagram"></i> INSTAGRAM
        </a>
        <a href="https://wa.me/9647764646451" class="btn btn-wa">
            <i class="fab fa-whatsapp"></i> WHATSAPP
        </a>
    </footer>

    <script>
        let currentPos = 0;
        const totalSlides = 5;
        const slider = document.getElementById('slider');

        function moveSlide(dir) {
            currentPos += dir;

            if (currentPos >= totalSlides) currentPos = 0;
            if (currentPos < 0) currentPos = totalSlides - 1;

            const movePercentage = currentPos * 100;
            slider.style.transform = `translateX(${movePercentage}%)`;
        }

        // دعم السحب باللمس (Swipe) للجوال
        let touchStartX = 0;
        slider.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
        slider.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 50) moveSlide(1);
            if (touchEndX - touchStartX > 50) moveSlide(-1);
        });
    </script>
</body>
</html>
